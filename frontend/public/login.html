<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-container {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .login-container h1 {
      font-size: 1.5em;
      margin-bottom: 8px;
      color: #fff;
    }
    .login-container p {
      font-size: 0.85em;
      color: #888;
      margin-bottom: 24px;
    }
    .login-container input {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a25;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95em;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-container input:focus {
      border-color: #646cff;
    }
    .login-container input::placeholder {
      color: #555;
    }
    .login-container button {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      background: #646cff;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-container button:hover {
      background: #535bf2;
    }
    .login-container button:disabled {
      background: #3a3a4a;
      cursor: not-allowed;
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 0.8em;
      margin-top: 12px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Nexus</h1>
    <p>Enter access token to continue</p>
    <form id="loginForm">
      <input type="password" id="tokenInput" placeholder="Access token" autocomplete="off" autofocus>
      <button type="submit" id="loginBtn">Login</button>
    </form>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const input = document.getElementById('tokenInput');
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('errorMsg');

    // If already logged in, redirect to app
    if (localStorage.getItem('nexus-token')) {
      window.location.href = '/';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = input.value.trim();
      if (!token) return;

      errorEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });

        if (res.ok) {
          localStorage.setItem('nexus-token', token);
          window.location.href = '/';
        } else if (res.status === 401) {
          errorEl.textContent = 'Invalid token';
        } else {
          errorEl.textContent = 'Server error';
        }
      } catch {
        errorEl.textContent = 'Connection failed';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
