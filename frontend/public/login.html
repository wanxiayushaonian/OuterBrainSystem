<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus — Login</title>
  <style>
    :root {
      --bg: oklch(99% 0.002 240);
      --surface: oklch(100% 0 0);
      --fg: oklch(18% 0.012 250);
      --muted: oklch(54% 0.012 250);
      --border: oklch(92% 0.005 250);
      --accent: oklch(58% 0.18 255);
      --accent-dim: oklch(48% 0.12 255);
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow-md: 0 4px 12px oklch(0% 0 0 / 0.06);
      --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 13px/1.5 var(--font-body);
      background: var(--bg);
      color: var(--fg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .login-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 360px;
      box-shadow: var(--shadow-md);
    }
    .login-container h1 {
      font: 600 20px/1.2 var(--font-display);
      margin-bottom: 4px;
    }
    .login-container p {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .login-container label {
      display: block;
      font: 500 11px/1 var(--font-body);
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .login-container input {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      font: 13px/1.5 var(--font-body);
      outline: none;
      transition: border-color var(--transition);
    }
    .login-container input:focus {
      border-color: var(--accent);
    }
    .login-container input::placeholder {
      color: oklch(72% 0.01 250);
    }
    .login-container button {
      width: 100%;
      padding: 9px;
      margin-top: 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: white;
      font: 600 13px/1 var(--font-body);
      cursor: pointer;
      transition: background var(--transition);
    }
    .login-container button:hover {
      background: var(--accent-dim);
    }
    .login-container button:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }
    .error-msg {
      color: oklch(55% 0.2 25);
      font-size: 12px;
      margin-top: 12px;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Nexus</h1>
    <p>Enter access token to continue</p>
    <form id="loginForm">
      <label for="tokenInput">Token</label>
      <input type="password" id="tokenInput" placeholder="Access token" autocomplete="off" autofocus>
      <button type="submit" id="loginBtn">Login</button>
    </form>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const input = document.getElementById('tokenInput');
    const btn = document.getElementById('loginBtn');
    const errorEl = document.getElementById('errorMsg');

    if (localStorage.getItem('nexus-token')) {
      window.location.href = '/';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = input.value.trim();
      if (!token) return;

      errorEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });

        if (res.ok) {
          localStorage.setItem('nexus-token', token);
          window.location.href = '/';
        } else if (res.status === 401) {
          errorEl.textContent = 'Invalid token';
        } else {
          errorEl.textContent = 'Server error';
        }
      } catch {
        errorEl.textContent = 'Connection failed';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
